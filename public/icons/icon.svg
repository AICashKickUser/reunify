<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" />
  <!-- Shield shape -->
  <path d="M256 80 L384 144 L384 272 C384 352 320 416 256 432 C192 416 128 352 128 272 L128 144 Z"
        fill="none" stroke="url(#heartGrad)" stroke-width="16" stroke-linejoin="round" />
  <!-- Heart inside shield -->
  <path d="M256 320
           C220 296 176 264 176 224
           C176 192 200 176 224 176
           C240 176 252 188 256 196
           C260 188 272 176 288 176
           C312 176 336 192 336 224
           C336 264 292 296 256 320Z"
        fill="url(#heartGrad)" />
  <!-- Small checkmark at top of shield -->
  <path d="M240 140 L254 158 L276 130"
        fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
</svg>
